name: AzureVM
options:
  bundleIdPrefix: com.azure-vm
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""  # Set your Apple Developer Team ID here

targets:
  AzureVM:
    type: application
    platform: iOS
    sources:
      - path: AzureVM
      - path: Shared
      - path: AzureVMIntents
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.azure-vm.app
        INFOPLIST_FILE: AzureVM/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: AzureVM/AzureVM.entitlements
    entitlements:
      path: AzureVM/AzureVM.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.azure-vm
    dependencies:
      - target: AzureVMWidgetExtension

  AzureVMWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: AzureVMWidget
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.azure-vm.app.widget
        INFOPLIST_FILE: AzureVMWidget/Info.plist
        CODE_SIGN_ENTITLEMENTS: AzureVMWidget/AzureVMWidget.entitlements
    entitlements:
      path: AzureVMWidget/AzureVMWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.azure-vm

schemes:
  AzureVM:
    build:
      targets:
        AzureVM: all
        AzureVMWidgetExtension: all
    run:
      config: Debug
    archive:
      config: Release
